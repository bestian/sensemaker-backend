name: CI

on:
    push:
        branches: [master]
    pull_request:
        branches: [master]

jobs:
    unit-and-typecheck:
        name: Unit & Typecheck
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Type check
              run: npx tsc --noEmit

            - name: Run tests
              run: npm test -- --run -t "^(?!.*queue integration with CSV file).*$"
              env:
                  OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY || 'ci-placeholder' }}
                  RUN_QUEUE_E2E: 'false'
